data:
  calculate_statistics: false
  data_dir: /opt/shared/datasets/CSIGen/TemporalWiMAE/train_35
  debug_size: null
  normalize: true
  statistics:
    mean_power: 1.4218511784624965e-11
  val_split: 0.1
logging:
  log_dir: runs
  log_every_n_steps: 100
  tensorboard: true
model:
  decoder_layers: 2
  decoder_nhead: 4
  embedding:
    type: linear
  encoder_dim: 128
  encoder_layers: 3
  encoder_nhead: 8
  encoder_type: factorized
  input_shape:
  - 14
  - 32
  - 32
  norm_first: false
  patch_size:
  - 1
  - 4
  - 4
  positional_encoding:
    decoder:
      type: sinusoidal_concat
    encoder:
      type: sinusoidal_concat
    num_time_keep: 2
    spatial_mask_ratio: 0.9
  scale_loss:
    eps: 1.0e-08
    lambda_dec: 0.1
    lambda_enc: 0.1
    use_scale_loss: false
  type: temporalenc_los
task:
  los:
    num_classes: 2
training:
  batch_size: 256
  device: cuda:0
  epochs: 200
  gradient_clip_val: 1.0
  loss: cross_entropy
  min_delta: 0.0001
  mixed_precision: true
  num_workers: 4
  optimizer:
    betas:
    - 0.9
    - 0.999
    lr: 0.0005
    type: adamw
    weight_decay: 0.005
  patience: 200
  save_best: true
  save_checkpoint_every_n: 10
  scale_loss:
    eps: 1.0e-08
    lambda_dec: 0.1
    lambda_enc: 0.1
    use_scale_loss: false
  scheduler:
    T_max: 200
    eta_min: 5.0e-06
    type: cosine
    warmup_epochs: 10
