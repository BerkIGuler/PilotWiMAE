# Supervised LoS vs. nLoS: standard (joint ST) encoder, full grid, linear head + CE loss.
model:
  type: "temporalenc_los"
  encoder_type: "standard"

  input_shape: [14, 32, 32]
  patch_size: [1, 4, 4]

  embedding:
    type: "linear"

  positional_encoding:
    encoder:
      type: "sinusoidal_concat"
    decoder:
      type: "sinusoidal_concat"

  norm_first: false

  encoder_dim: 128
  encoder_layers: 3
  encoder_nhead: 8
  decoder_layers: 2  # unused for supervised training
  decoder_nhead: 4  # unused for supervised training

task:
  los:
    num_classes: 2

data:
  data_dir: "/opt/shared/datasets/CSIGen/PilotWiMAE/train_35"
  normalize: true
  val_split: 0.1
  debug_size: null
  calculate_statistics: false
  statistics:
    mean_power: 1.4218511784624965e-11

training:
  batch_size: 256
  epochs: 200
  num_workers: 4
  device: "cuda:0"

  optimizer:
    type: "adamw"
    lr: 0.0005
    weight_decay: 0.005
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    T_max: 200
    warmup_epochs: 10
    eta_min: 0.000005

  loss: "cross_entropy"

  scale_loss:  # not used for supervised training
    use_scale_loss: false
    lambda_enc: 0.1
    lambda_dec: 0.1
    eps: 1.0e-8

  mixed_precision: true

  patience: 200
  min_delta: 0.0001
  gradient_clip_val: 1.0
  save_checkpoint_every_n: 10
  save_best: true

logging:
  log_dir: "runs"
  tensorboard: true
  log_every_n_steps: 100
