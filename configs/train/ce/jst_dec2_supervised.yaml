# Supervised channel estimation: fixed pilot pattern, reconstruct masked patches with MSE.

model:
  type: "temporalenc_ce"
  encoder_type: "standard"

  input_shape: [14, 32, 32]
  patch_size: [1, 4, 4]

  embedding:
    type: "linear"

  positional_encoding:
    encoder:
      type: "sinusoidal_concat"
    decoder:
      type: "sinusoidal_concat"

  # Required by PilotWiMAE init; CE training itself uses fixed pilots from
  # task.channel_estimation.pilot_pattern via reconstruct_pilot_masked().
  masking:
    strategy: "random"
    mask_ratio: 0.9

  norm_first: false

  encoder_dim: 128
  encoder_layers: 6
  encoder_nhead: 8
  decoder_layers: 2
  decoder_nhead: 8

task:
  channel_estimation:
    pilot_pattern: "t:2,11;f:0,2,4,6"

data:
  data_dir: "/home/berkay/Desktop/CSIGen/PilotWiMAE/train_35"
  normalize: true
  val_split: 0.1
  debug_size: null
  calculate_statistics: false
  statistics:
    mean_power: 1.4218511784624965e-11

training:
  batch_size: 256
  epochs: 300
  num_workers: 4
  device: "cuda:0"

  optimizer:
    type: "adamw"
    lr: 0.0005
    weight_decay: 0.005
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    T_max: 300
    warmup_epochs: 10
    eta_min: 0.000005

  loss: "mse"

  mixed_precision: true

  patience: 300
  min_delta: 0.0001
  gradient_clip_val: 1.0
  save_checkpoint_every_n: 10
  save_best: true

logging:
  log_dir: "runs"
  tensorboard: true
  log_every_n_steps: 100
