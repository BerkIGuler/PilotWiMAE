model:
  type: "pilotwimae"
  encoder_type: "factorized"

  input_shape: [14, 32, 32]
  patch_size: [1, 4, 4]

  embedding:
    type: "linear"

  positional_encoding:
    encoder:
      type: "sinusoidal_concat"
    decoder:
      type: "sinusoidal_concat"

  masking:
    strategy: "factorized"
    num_time_keep: 2
    spatial_mask_ratio: 0.9

  norm_first: false

  encoder_dim: 128
  encoder_layers: 3
  encoder_nhead: 8
  decoder_layers: 2
  decoder_nhead: 4

data:
  data_dir: "/home/berkay/Desktop/CSIGen/PilotWiMAE/train_35"
  normalize: true
  val_split: 0.1
  debug_size: null

  calculate_statistics: false
  statistics:
    mean_power: 1.4218511784624965e-11

training:
  batch_size: 512
  epochs: 500
  num_workers: 4
  device: "cuda:0"

  optimizer:
    type: "adamw"
    lr: 0.0005
    weight_decay: 0.005
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    T_max: 500
    warmup_epochs: 10
    eta_min: 0.000005

  loss: "mse"

  norm_patch_loss: true
  norm_patch_loss_eps: 1.0e-6

  noise_robust:
    enabled: true
    snr_start_db: 40
    snr_max_db: 40

  mixed_precision: true

  patience: 500
  min_delta: 0.0001

  gradient_clip_val: 1.0

  save_checkpoint_every_n: 10
  save_best: true

  
logging:
  log_dir: "runs"
  tensorboard: true
  log_every_n_steps: 100
